# Workflow to trigger/schedule benchmarking, cleaning, aggregating on master branch only and storing results in S3
name: Benchmark Master Branch
on:
  push:
    branches: ["timeseries_bench"]
  schedule:
    - cron: '00 09 * * SUN' #  UTC 9:00(2:00 PST Time) every Sunday

env:
  AG_PRESET: medium
  AG_BRANCH_NAME: master
  
permissions:
  id-token: write
  contents: read

jobs:
  generate_amlb_user_dir:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AG_MODULE: [tabular, timeseries]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Setup Env Vars
        uses: ./.github/actions/setup-env-vars
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::369469875935:role/AutoGluonCIBenchmarkConfig
          role-duration-seconds: 3600
          aws-region: us-east-1
      - name: Generate AMLB User Dir - ${{ matrix.AG_MODULE }}
        run: |
          /bin/bash CI/bench/generate_amlb_user_dir.sh ${{ matrix.AG_MODULE }} ${{ github.repository }} ${{ env.AG_BRANCH_NAME }} ${{ github.sha }}
      
  benchmark:
    needs: generate_amlb_user_dir
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AG_PARAMS: ['tabular-small-1h8c', 'timeseries-test-test101']
    defaults:
      run:
        shell: bash
    steps:
      - name: Free Disk Space (Ubuntu)
        # uses: jlumbroso/free-disk-space@v1.2.0
        uses: hirnidrin/free-disk-space@main  # revert back once fix in https://github.com/jlumbroso/free-disk-space/pull/11
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout repository for PR
        uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: '3.9'
      - name: Setup npm
        uses: actions/setup-node@v3
        with:
          node-version: 'latest'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::369469875935:role/AutoGluonCIBenchmark
          role-duration-seconds: 14400
          aws-region: us-east-1
      - name: "Run benchmark - ${{ matrix.AG_PARAMS == 'tabular-small-1h8c' ? 'Tabular' : matrix.AG_PARAMS == 'timeseries-test-test101' ? 'Timeseries' : 'Invalid Combination' }}"
        shell: bash -l {0}
        run: |
          nvm install 20
          npm install -g aws-cdk
          AG_MODULE=$(echo ${{ matrix.AG_PARAMS }} | cut -d'-' -f1)
          AG_BENCHMARK=$(echo ${{ matrix.AG_PARAMS }} | cut -d'-' -f2)
          AG_TIME_LIMIT=$(echo ${{ matrix.AG_PARAMS }} | cut -d'-' -f3)
          /bin/bash ./.github/workflow_scripts/run_benchmark.sh $AG_MODULE ${{ env.AG_PRESET }} $AG_BENCHMARK $AG_TIME_LIMIT ${{ env.AG_BRANCH_NAME }} ${{ github.sha }}
